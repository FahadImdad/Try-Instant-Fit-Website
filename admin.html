<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Try Instant Fit</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/jpeg" href="/assets/website-icon.png">
  <link rel="apple-touch-icon" href="/assets/website-icon.png">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { background: #fff; }

    .admin-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .admin-header h1 {
      margin: 0;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .admin-header .badge-admin {
      background: linear-gradient(135deg, #5a67f2, #ec4899);
      color: white;
      padding: .25rem .65rem;
      border-radius: var(--r-full);
      font-size: .68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    /* Login */
    .login-box {
      max-width: 400px;
      margin: 6rem auto;
      background: white;
      border-radius: var(--r-xl);
      padding: 2.5rem 2rem;
      box-shadow: var(--sh2);
      text-align: center;
    }
    .login-box h2 { margin: 0 0 .5rem; }
    .login-box .field { text-align: left; margin-bottom: 1rem; }
    .login-box label { display: block; font-weight: 600; font-size: .85rem; margin-bottom: .35rem; }
    .login-box input {
      width: 100%;
      padding: .75rem .9rem;
      border: 2px solid var(--border);
      border-radius: var(--r-md);
      font-size: 1rem;
      font-family: inherit;
      box-sizing: border-box;
    }
    .login-box input:focus { border-color: var(--cyan); outline: none; }

    /* Tabs */
    .admin-tabs {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--border);
    }
    .admin-tab {
      background: none;
      border: none;
      padding: .85rem 1.25rem;
      font-size: .95rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .admin-tab:hover { color: var(--text); }
    .admin-tab.active { color: var(--indigo); border-bottom-color: var(--indigo); }
    .admin-tab .count {
      background: var(--surface);
      color: var(--muted);
      padding: .15rem .5rem;
      border-radius: var(--r-full);
      font-size: .68rem;
      font-weight: 700;
    }
    .admin-tab.active .count { background: rgba(90,103,242,.15); color: var(--indigo); }
    .admin-pane { display: none; }
    .admin-pane.active { display: block; }

    /* Filters */
    .filter-row {
      display: flex;
      gap: .5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .filter-pill {
      padding: .4rem .9rem;
      border-radius: var(--r-full);
      border: 1px solid var(--border);
      background: white;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      color: var(--muted);
      transition: all .2s;
    }
    .filter-pill:hover { border-color: var(--indigo); color: var(--indigo); }
    .filter-pill.active { background: var(--indigo); border-color: var(--indigo); color: white; }

    /* Tables */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: var(--r-xl);
      overflow: hidden;
      box-shadow: var(--sh1);
    }
    .data-table th {
      text-align: left;
      padding: .85rem 1rem;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      font-size: .88rem;
      vertical-align: middle;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--surface); }

    .status-pill {
      display: inline-block;
      padding: .15rem .6rem;
      border-radius: var(--r-full);
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .pill-new       { background: #dbeafe; color: #1e40af; }
    .pill-contacted { background: #fef3c7; color: #92400e; }
    .pill-qualified { background: #ede9fe; color: #5b21b6; }
    .pill-converted { background: #d1fae5; color: #065f46; }
    .pill-rejected  { background: #fee2e2; color: #991b1b; }
    .pill-pending   { background: #fef3c7; color: #92400e; }
    .pill-active    { background: #d1fae5; color: #065f46; }
    /* Legacy 'trial' status — same colour as pending until existing brands are migrated. */
    .pill-trial     { background: #fef3c7; color: #92400e; }

    .row-actions { display: flex; gap: .35rem; flex-wrap: wrap; }
    .row-actions .btn { font-size: .75rem; padding: .35rem .65rem; }

    /* Credits cell */
    .credits-cell {
      display: flex;
      flex-direction: column;
      gap: .2rem;
    }
    .credits-num {
      font-weight: 800;
      font-size: .95rem;
    }
    .credits-num.low { color: #dc2626; }
    .credits-num.warn { color: #d97706; }
    .credits-num.ok { color: #059669; }
    .credits-num.unlimited { color: #5a67f2; }

    .alert { padding: .75rem 1rem; border-radius: var(--r-md); font-size: .85rem; margin-bottom: 1rem; display: none; }
    .alert.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; display: block; }
    .alert.success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; display: block; }

    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); background: white; border-radius: var(--r-xl); }
    .empty .icon { font-size: 2.5rem; margin-bottom: .75rem; }

    /* Modal */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-bg.open { display: flex; }
    .modal-box {
      background: white;
      border-radius: var(--r-xl);
      padding: 2rem;
      max-width: 560px;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: var(--sh3);
    }
    .modal-box h3 { margin: 0 0 .5rem; font-size: 1.2rem; }
    .modal-box .close-x {
      float: right;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--muted);
      margin-top: -.5rem;
    }
    .modal-box .field { margin-bottom: 1rem; }
    .modal-box label { display: block; font-weight: 600; font-size: .85rem; margin-bottom: .35rem; }
    .modal-box input, .modal-box select, .modal-box textarea {
      width: 100%;
      padding: .65rem .8rem;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      font-size: .95rem;
      font-family: inherit;
      box-sizing: border-box;
    }
    .modal-box input:focus, .modal-box select:focus { border-color: var(--indigo); outline: none; }

    @media (max-width: 600px) {
      .admin-shell { padding: 1rem .75rem; }

      /* ── Header: keep logo on one line, shrink buttons ── */
      .admin-header { gap: .5rem; margin-bottom: 1rem; }
      .admin-header h1 { font-size: 1.05rem; gap: .4rem; flex: 1 1 auto; min-width: 0; }
      .admin-header h1 img { height: 28px !important; }
      .admin-header h1 span { font-size: .95rem !important; }
      .admin-header .badge-admin { padding: .15rem .45rem; font-size: .6rem; }

      /* ── Tabs: scroll horizontally instead of wrapping ── */
      .admin-tabs {
        flex-wrap: nowrap;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        margin: 0 -.75rem 1rem;     /* bleed to edge so scroll area uses full width */
        padding: 0 .75rem;
        scrollbar-width: none;
      }
      .admin-tabs::-webkit-scrollbar { display: none; }
      .admin-tab {
        white-space: nowrap;
        flex-shrink: 0;
        padding: .7rem .9rem;
        font-size: .85rem;
      }

      /* ── Filter row: stack search below pills, no overflow ── */
      .filter-row { gap: .4rem; }
      .filter-row input[type="search"] {
        min-width: 0 !important;
        width: 100%;
        margin-left: 0 !important;
        flex: 1 1 100%;
        order: -1;          /* search above pills, easier to reach */
        margin-bottom: .25rem;
      }
      .filter-pill { font-size: .78rem; padding: .35rem .7rem; }

      /* Brands pane has its own search outside .filter-row — same treatment */
      #pane-brands input[type="search"] {
        min-width: 0 !important;
        width: 100%;
      }
      #pane-brands > div:first-child { flex-direction: column; align-items: stretch !important; }

      /* ── Cards in place of tables (clean, scannable) ── */
      .data-table {
        display: block;
        background: transparent;
        box-shadow: none;
        border-radius: 0;
        overflow: visible;
      }
      .data-table thead { display: none; }
      .data-table tbody { display: block; }
      .data-table tr {
        display: block;
        background: white;
        padding: .9rem;
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: .6rem;
        box-shadow: 0 1px 2px rgba(0,0,0,.04);
      }
      .data-table tr:hover td { background: transparent; }
      .data-table td {
        display: block;
        padding: 0;
        border: none;
        font-size: .85rem;
      }
      /* Drop the noisy "Brand: Status: Credits:" prefixes — labels are
         redundant when content is self-describing (a name, a pill, a number). */
      .data-table td:before { display: none; }

      /* ── Brand cell: name + email + faded UUID ── */
      .data-table td[data-label="Brand"] { margin-bottom: .55rem; }
      .data-table td[data-label="Brand"] strong { font-size: 1rem; display: block; line-height: 1.2; }
      .data-table td[data-label="Brand"] > div:nth-of-type(1) { font-size: .78rem; color: var(--muted); margin-top: .15rem; }
      .data-table td[data-label="Brand"] > div:nth-of-type(2) { font-size: .62rem; opacity: .55; margin-top: .2rem; }

      /* ── Status pill on its own line, compact ── */
      .data-table td[data-label="Status"] { margin-bottom: .55rem; }

      /* ── Inline metrics row: Credits · Used · Rate ── */
      .data-table td[data-label="Credits"],
      .data-table td[data-label="Used"],
      .data-table td[data-label="Rate"] {
        display: inline-block;
        vertical-align: top;
        margin-right: 1rem;
        margin-bottom: .35rem;
        font-size: .82rem;
      }
      .data-table td[data-label="Credits"]:before,
      .data-table td[data-label="Used"]:before,
      .data-table td[data-label="Rate"]:before {
        display: block;
        content: attr(data-label);
        font-size: .6rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .05em;
        color: var(--muted);
        margin-bottom: .15rem;
      }
      .data-table td[data-label="Used"] > div { gap: .05rem !important; }

      /* ── Actions: full-width row of equal-flex buttons ── */
      .data-table td[data-label="Actions"] { margin-top: .65rem; }
      .data-table .row-actions { display: flex; gap: .4rem; flex-wrap: wrap; }
      .data-table .row-actions .btn,
      .data-table .row-actions a.btn {
        flex: 1 1 0;
        min-width: 0;
        font-size: .82rem;
        padding: .55rem .5rem;
        text-align: center;
      }

      /* ── Top-Ups table: same compact treatment + thumbnail inline ── */
      .data-table td[data-label="Amount"]      { display: inline-block; margin-right: 1rem; margin-bottom: .35rem; }
      .data-table td[data-label="Credits"]     { display: inline-block; margin-right: 1rem; margin-bottom: .35rem; }
      .data-table td[data-label="Method"]      { display: block; margin-bottom: .4rem; font-size: .8rem; }
      .data-table td[data-label="Screenshot"] img { width: 80px !important; height: 80px !important; }
      .data-table td[data-label="Date"]        { font-size: .72rem; color: var(--muted); margin-bottom: .4rem; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN VIEW ── -->
<div id="loginView">
  <div class="login-box">
    <div style="display: flex; align-items: center; gap: .6rem; margin-bottom: 1rem;">
      <img src="/assets/logo.png" alt="Try Instant Fit" style="height: 36px; width: auto; display: block;">
    </div>
    <h2>Admin Login</h2>
    <p style="color: var(--muted); font-size: .9rem; margin: 0 0 1.5rem;">Try Instant Fit · Internal</p>
    <div class="alert" id="loginError"></div>
    <form onsubmit="return doLogin(event);">
      <div class="field">
        <label for="loginUser">Username</label>
        <input type="text" id="loginUser" required autocomplete="username">
      </div>
      <div class="field">
        <label for="loginPass">Password</label>
        <input type="password" id="loginPass" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width: 100%; padding: .8rem; font-size: 1rem;" id="loginBtn">Sign In →</button>
    </form>
  </div>
</div>

<!-- ── ADMIN VIEW ── -->
<div id="adminView" style="display: none;">
  <div class="admin-shell">
    <div class="admin-header">
      <h1 style="display: flex; align-items: center; gap: .65rem; margin: 0;"><img src="/assets/logo.png" alt="Try Instant Fit" style="height: 38px; width: auto; display: block;"> <span style="font-size: 1.1rem; font-weight: 800; letter-spacing: -.02em;">Admin</span> <span class="badge-admin">TIF</span></h1>
      <div style="display: flex; gap: .5rem; align-items: center;">
        <button class="btn btn-secondary btn-sm" onclick="refreshAll()">↻ Refresh</button>
        <button class="btn btn-secondary btn-sm" onclick="logout()">Sign Out</button>
      </div>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="analytics" onclick="switchAdminTab('analytics')">📊 Analytics</button>
      <button class="admin-tab" data-tab="topups" onclick="switchAdminTab('topups')">💳 Top-Up Requests <span class="count" id="cntTopups" style="background:#fef3c7; color:#92400e;">0</span></button>
      <button class="admin-tab" data-tab="reports" onclick="switchAdminTab('reports')">🚩 Reports <span class="count" id="cntReports" style="background:#fee2e2; color:#991b1b;">0</span></button>
      <button class="admin-tab" data-tab="brands" onclick="switchAdminTab('brands')">🏢 Brands <span class="count" id="cntBrands">0</span></button>
    </div>

    <!-- ── ANALYTICS PANE ── -->
    <div id="pane-analytics" class="admin-pane active">
      <div id="analyticsBody" style="display:grid; gap:1.25rem;">
        <div class="empty"><p style="color:var(--muted); margin:0;">Loading analytics…</p></div>
      </div>
    </div>

    <!-- ── TOPUPS PANE ── -->
    <div id="pane-topups" class="admin-pane">
      <div class="filter-row" id="topupFilters">
        <button class="filter-pill active" data-filter="" onclick="filterTopups('')">All</button>
        <button class="filter-pill" data-filter="pending" onclick="filterTopups('pending')">Pending</button>
        <button class="filter-pill" data-filter="approved" onclick="filterTopups('approved')">Approved</button>
        <button class="filter-pill" data-filter="rejected" onclick="filterTopups('rejected')">Rejected</button>
        <input type="search" id="topupSearch" placeholder="🔎  Search by brand, email, receipt, or amount…" oninput="renderTopups()" style="margin-left:auto; padding:.5rem .85rem; border:1px solid var(--border); border-radius: var(--r-md); font-size:.85rem; min-width:280px; font-family: inherit;">
      </div>
      <div id="topupsList"></div>
    </div>

    <!-- ── REPORTS PANE ── -->
    <div id="pane-reports" class="admin-pane">
      <div class="filter-row">
        <button class="filter-pill active" data-filter="" onclick="filterReports('')">All</button>
        <button class="filter-pill" data-filter="pending"  onclick="filterReports('pending')">Pending</button>
        <button class="filter-pill" data-filter="approved" onclick="filterReports('approved')">Approved (Refunded)</button>
        <button class="filter-pill" data-filter="denied"   onclick="filterReports('denied')">Denied</button>
        <button class="filter-pill" data-filter="closed"   onclick="filterReports('closed')">Closed</button>
        <input type="search" id="reportSearch" placeholder="🔎  Search by brand, reason, or message…" oninput="renderReports()" style="margin-left:auto; padding:.5rem .85rem; border:1px solid var(--border); border-radius: var(--r-md); font-size:.85rem; min-width:280px; font-family: inherit;">
      </div>
      <div id="reportsList"></div>
    </div>

    <!-- ── BRANDS PANE ── -->
    <div id="pane-brands" class="admin-pane">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: .5rem;">
        <p style="color: var(--muted); font-size: .85rem; margin: 0;">All registered brands with credit balance and usage.</p>
        <input type="search" id="brandSearch" placeholder="🔎  Search by name, email, or ID…" oninput="renderBrands()" style="padding:.5rem .85rem; border:1px solid var(--border); border-radius: var(--r-md); font-size:.85rem; min-width:260px; font-family: inherit;">
      </div>
      <div id="brandsList"></div>
    </div>
  </div>
</div>

<!-- ── MODAL: Reject Top-Up ── -->
<div class="modal-bg" id="rejectTopupModal" onclick="if(event.target===this)closeRejectTopupModal()">
  <div class="modal-box" style="max-width: 480px;">
    <button class="close-x" onclick="closeRejectTopupModal()">&times;</button>
    <h3>Reject Top-Up Request</h3>
    <p style="color: var(--muted); font-size: .85rem; margin: 0 0 1.25rem;">The brand will see this reason. Leave blank if you don't want to share one.</p>
    <div class="alert" id="rjError"></div>
    <form onsubmit="return submitRejectTopup(event);">
      <div class="field">
        <label>Reason (optional)</label>
        <textarea id="rjReason" rows="4" placeholder="e.g. We couldn't verify the payment screenshot. Please re-send a clearer one on WhatsApp."></textarea>
      </div>
      <div style="display:flex; gap:.5rem; margin-top:.5rem;">
        <button type="button" class="btn btn-secondary" style="flex:1;" onclick="closeRejectTopupModal()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="rjSubmit" style="flex:1; background:#ef4444; border-color:transparent;">Reject Request</button>
      </div>
    </form>
  </div>
</div>

<!-- ── MODAL: Add Credits ── -->
<div class="modal-bg" id="addCreditsModal" onclick="if(event.target===this)closeAddCreditsModal()">
  <div class="modal-box">
    <button class="close-x" onclick="closeAddCreditsModal()">&times;</button>
    <h3 id="acTitle">Add Credits</h3>
    <p style="color: var(--muted); font-size: .85rem; margin: 0 0 1.25rem;" id="acSubtitle"></p>
    <div class="alert" id="acError"></div>
    <form onsubmit="return submitAddCredits(event);">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="field">
          <label>Credits to Add</label>
          <input type="number" id="acCredits" min="1" required>
        </div>
        <div class="field">
          <label>Amount Paid (USD)</label>
          <input type="number" id="acAmount" step="0.01" min="0">
        </div>
      </div>
      <p style="color: var(--muted); font-size: .8rem; margin: -.5rem 0 1rem;" id="acHint"></p>
      <div class="field">
        <label>Payment Reference</label>
        <input type="text" id="acRef" placeholder="bank ref / invoice no.">
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="acNotes" rows="2"></textarea>
      </div>
      <button type="submit" class="btn btn-primary" id="acSubmit" style="width: 100%; padding: .8rem;">Add Credits →</button>
    </form>
  </div>
</div>

<script>
// Same-origin via Vercel rewrite (see vercel.json). Avoids adblock/CORS issues.
const API = '';

let authHeader = sessionStorage.getItem('admin_auth') || '';
let allBrands = [];

// Auto-login if we have a stored auth header
(function autoLogin() {
  if (authHeader) verifyAuthAndShow();
})();

async function doLogin(e) {
  e.preventDefault();
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.className = 'alert';

  const candidate = 'Basic ' + btoa(user + ':' + pass);
  btn.disabled = true;
  btn.textContent = 'Checking…';

  try {
    const res = await fetch(`${API}/api/admin/login`, {
      method: 'POST',
      headers: { 'Authorization': candidate, 'Content-Type': 'application/json' },
    });
    if (!res.ok) {
      errEl.textContent = 'Invalid username or password.';
      errEl.className = 'alert error';
      return false;
    }
    authHeader = candidate;
    sessionStorage.setItem('admin_auth', authHeader);
    showAdmin();
  } catch (err) {
    errEl.textContent = 'Network error. Try again.';
    errEl.className = 'alert error';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In →';
  }
  return false;
}

async function verifyAuthAndShow() {
  try {
    const res = await fetch(`${API}/api/admin/login`, {
      method: 'POST',
      headers: { 'Authorization': authHeader, 'Content-Type': 'application/json' },
    });
    if (res.ok) showAdmin();
    else logout();
  } catch (err) {
    // Allow login screen to be shown
  }
}

function showAdmin() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('adminView').style.display = 'block';
  refreshAll();
}

function logout() {
  authHeader = '';
  sessionStorage.removeItem('admin_auth');
  document.getElementById('adminView').style.display = 'none';
  document.getElementById('loginView').style.display = 'block';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

async function fetchAdmin(path, opts = {}) {
  const res = await fetch(`${API}${path}`, {
    ...opts,
    headers: {
      'Authorization': authHeader,
      'Content-Type': 'application/json',
      ...(opts.headers || {}),
    },
  });
  if (res.status === 401) {
    logout();
    throw new Error('Session expired. Please sign in again.');
  }
  return res;
}

function switchAdminTab(name) {
  document.querySelectorAll('.admin-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.admin-pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + name));
}

async function refreshAll() {
  await Promise.all([loadBrands(), loadTopups(), loadReports()]);
  // Analytics is derived from those — re-render after all land.
  renderAnalytics();
}

// Tiny HTML-escape helper for any user-controlled string we render.
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;',
  })[c]);
}

// ──────────────────────────────────────────────────────────────────────
// REPORTS — admin queue, approve refund / deny / close
// ──────────────────────────────────────────────────────────────────────
let allReports = [];
let reportFilter = '';

async function loadReports() {
  try {
    const res = await fetchAdmin(`/api/admin/reports`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to load reports');
    allReports = data.reports || [];
  } catch (err) {
    console.error('[reports] load failed:', err);
    allReports = [];
  }
  renderReports();
}

function filterReports(f) {
  reportFilter = f;
  document.querySelectorAll('#pane-reports .filter-pill').forEach(p =>
    p.classList.toggle('active', p.dataset.filter === f)
  );
  renderReports();
}

function renderReports() {
  const list = document.getElementById('reportsList');
  if (!list) return;
  const search = (document.getElementById('reportSearch')?.value || '').trim().toLowerCase();
  let rows = allReports;
  if (reportFilter) rows = rows.filter(r => r.status === reportFilter);
  if (search) {
    rows = rows.filter(r => {
      const blob = [
        r.brand?.name, r.brand?.email, r.reason, r.message, r.type, r.status,
      ].filter(Boolean).join(' ').toLowerCase();
      return blob.includes(search);
    });
  }

  // Update tab count badge with the number of pending reports
  const pendingCount = allReports.filter(r => r.status === 'pending').length;
  const cnt = document.getElementById('cntReports');
  if (cnt) cnt.textContent = pendingCount;

  if (!rows.length) {
    list.innerHTML = `<div class="empty"><p style="color:var(--muted); margin:0;">No reports${reportFilter ? ' in this filter' : ''}.</p></div>`;
    return;
  }

  list.innerHTML = rows.map(r => {
    const statusBadge = ({
      pending:  '<span class="status-badge" style="background:#fef3c7; color:#92400e;">Pending</span>',
      approved: '<span class="status-badge" style="background:#d1fae5; color:#065f46;">✓ Refunded</span>',
      denied:   '<span class="status-badge" style="background:#fee2e2; color:#991b1b;">Denied</span>',
      closed:   '<span class="status-badge" style="background:#e5e7eb; color:#374151;">Closed</span>',

      tryon_bad: '🚩 Bad try-on',
      image_bad: '🖼️ Bad image-process',
      feedback:  '💬 Feedback',
      difficulty: '⚠️ Platform difficulty',
    })[r.type] || r.type;

    const refundEligible = (r.type === 'tryon_bad' || r.type === 'image_bad');
    const isPending = r.status === 'pending';

    return `
      <div class="topup-card" style="border-left: 4px solid ${r.status === 'pending' ? '#f59e0b' : 'transparent'};">
        <div style="display:flex; justify-content:space-between; gap:1rem; flex-wrap:wrap; margin-bottom:.5rem;">
          <div>
            <strong style="font-size:.95rem;">${typeLabel}</strong>
            ${statusBadge}
            <span style="font-size:.78rem; color:var(--muted); margin-left:.5rem;">${new Date(r.created_at).toLocaleString()}</span>
          </div>
          <div style="font-size:.82rem; color:var(--muted);">
            Brand: <strong style="color:var(--text);">${escapeHtml(r.brand?.name || r.brand_id || 'Unknown')}</strong>
            ${r.brand?.email ? ` · ${escapeHtml(r.brand.email)}` : ''}
          </div>
        </div>
        ${r.reason  ? `<div style="font-size:.85rem; margin-bottom:.25rem;"><strong>Reason:</strong> ${escapeHtml(r.reason)}</div>` : ''}
        ${r.message ? `<div style="font-size:.85rem; margin-bottom:.5rem; white-space:pre-wrap;"><strong>Note:</strong> ${escapeHtml(r.message)}</div>` : ''}
        <div style="display:flex; gap:.5rem; flex-wrap:wrap; font-size:.78rem; color:var(--muted); margin-bottom:.5rem;">
          ${r.product_id  ? `<span>Product: <code>${escapeHtml(r.product_id)}</code></span>` : ''}
          ${r.qr_id       ? `<span>QR: <code>${escapeHtml(r.qr_id.slice(0,8))}…</code></span>` : ''}
          ${r.tryon_id    ? `<span>Try-on: <code>${escapeHtml(r.tryon_id.slice(0,8))}…</code></span>` : ''}
        </div>
        ${r.result_url ? `<div style="margin-bottom:.5rem;"><a href="${escapeHtml(r.result_url)}" target="_blank" rel="noopener" style="color: var(--cyan); font-size:.85rem;">↗ View try-on result image</a></div>` : ''}
        ${r.screenshot_url ? `<div style="margin-bottom:.5rem;"><a href="${escapeHtml(r.screenshot_url)}" target="_blank" rel="noopener" style="color: var(--cyan); font-size:.85rem;">↗ View user screenshot</a></div>` : ''}
        ${r.resolution_note ? `<div style="font-size:.82rem; color:var(--muted); padding:.5rem .75rem; background:var(--surface); border-radius: var(--r-md); margin-bottom:.5rem;"><strong>Resolution:</strong> ${escapeHtml(r.resolution_note)} ${r.resolved_by ? `· by ${escapeHtml(r.resolved_by)}` : ''}</div>` : ''}
        ${isPending ? `
          <div style="display:flex; gap:.5rem; flex-wrap:wrap;">
            ${refundEligible ? `<button class="btn btn-primary btn-sm" onclick="resolveReport('${r.id}', 'approve')" style="background:#10b981; border-color:transparent;">✓ Approve & Refund $0.125</button>` : ''}
            <button class="btn btn-secondary btn-sm" onclick="resolveReport('${r.id}', 'deny')" style="color:#991b1b; border-color:#fca5a5;">✕ Deny</button>

          </div>
        ` : ''}
      </div>`;

async function resolveReport(reportId, action) {
  let note = null;
  if (action === 'deny' || action === 'close') {
    note = prompt(action === 'deny' ? 'Reason for denying (optional, shown to brand):' : 'Closing note (optional):');
    if (note === null) return; // user cancelled
  } else if (action === 'approve') {
    if (!confirm('Approve this report and refund 1 credit ($0.125) to the brand?')) return;
  }
  try {
    const res = await fetchAdmin(`/api/admin/reports/${reportId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, resolution_note: note || null, resolved_by: getAdminEmail() || 'admin' }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    await loadReports();
  } catch (err) {
    alert('Could not resolve: ' + (err.message || err));
  }
}

function getAdminEmail() {
  try { return localStorage.getItem('tif_admin_email') || ''; } catch { return ''; }
}

// ── ANALYTICS ──
function renderAnalytics() {
  const body = document.getElementById('analyticsBody');
  if (!body) return;

  const brands = allBrands || [];
  const topups = allTopups || [];

  // Brand stats
  const totalBrands = brands.length;
  const byStatus = brands.reduce((acc, b) => {
    const s = b.status === 'trial' ? 'pending' : (b.status || 'pending');
    acc[s] = (acc[s] || 0) + 1;
    return acc;
  }, {});

  // Try-on totals split: customer try-ons vs product-upload processing.
  // (Both consume credits at the same rate; we track them separately so admin
  //  can see exactly how much spend goes to scans vs catalog ingestion.)
  const totalTryons = brands.reduce((sum, b) => sum + (b.tryon_count || 0), 0);
  const totalUploads = brands.reduce((sum, b) => sum + (b.process_count || 0), 0);
  const totalCreditsRemaining = brands.reduce((sum, b) => {
    if (b.unlimited) return sum;
    return sum + Math.max(0, (b.tryon_credits || 0) - (b.tryon_credits_used || 0));
  }, 0);

  // Revenue (approved top-ups) + pending volume
  const approvedTopups = topups.filter(t => t.status === 'approved');
  const pendingTopups  = topups.filter(t => t.status === 'pending');
  const rejectedTopups = topups.filter(t => t.status === 'rejected');
  const revenueUsd = approvedTopups.reduce((s, t) => s + Number(t.amount_usd || 0), 0);
  const pendingUsd = pendingTopups.reduce((s, t) => s + Number(t.amount_usd || 0), 0);
  const creditsSold = approvedTopups.reduce((s, t) => s + Number(t.credits_requested || 0), 0);

  // Top brands by customer try-ons (the metric brands actually care about)
  const topBrands = [...brands]
    .filter(b => (b.tryon_count || 0) > 0)
    .sort((a, b) => (b.tryon_count || 0) - (a.tryon_count || 0))
    .slice(0, 5);

  // Last 30 days — approvals + try-ons
  const cutoff = Date.now() - 30 * 24 * 3600 * 1000;
  const recentApprovedRevenue = approvedTopups
    .filter(t => new Date(t.reviewed_at || t.created_at).getTime() >= cutoff)
    .reduce((s, t) => s + Number(t.amount_usd || 0), 0);

  const fmtUsd = n => `$${Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
  const fmtN   = n => Number(n).toLocaleString();

  body.innerHTML = `
    <!-- Headline KPI grid -->
    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem;">
      ${kpi('💰 Revenue (approved)', fmtUsd(revenueUsd), `${approvedTopups.length} approved · ${fmtUsd(recentApprovedRevenue)} last 30d`)}
      ${kpi('⏳ Pending revenue',     fmtUsd(pendingUsd), `${pendingTopups.length} pending top-ups`)}
      ${kpi('🧥 Try-ons run',         fmtN(totalTryons),  `customer scans across ${totalBrands} brand${totalBrands === 1 ? '' : 's'}`)}
      ${kpi('📦 Product uploads',     fmtN(totalUploads), 'image-processing credits used')}
      ${kpi('🎟️ Credits sold',        fmtN(creditsSold),  `~${fmtN(totalCreditsRemaining)} unused in wallets`)}
      ${kpi('🏢 Active brands',       String(byStatus.active || 0), `${byStatus.pending || 0} pending · ${byStatus.suspended || 0} suspended`)}
      ${kpi('❌ Rejected top-ups',    String(rejectedTopups.length), 'of all time')}
    </div>

    <!-- Top brands -->
    <div style="background:#fff; border:1px solid var(--border); border-radius: var(--r-md); padding: 1.25rem;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:.85rem;">
        <strong style="font-size:.95rem;">Top Brands by Try-Ons</strong>
        <span style="font-size:.75rem; color:var(--muted);">All time</span>
      </div>
      ${topBrands.length === 0
        ? '<div style="color:var(--muted); font-size:.85rem;">No try-ons run yet.</div>'
        : `
        <div style="display:grid; gap:.5rem;">
          ${topBrands.map((b, i) => {
            const used = b.tryon_count || 0;
            const max  = topBrands[0].tryon_count || 1;
            const pct  = (used / max) * 100;
            const uploads = b.process_count || 0;
            return `
              <div style="display:grid; grid-template-columns: 28px 1fr auto; gap:.75rem; align-items:center;">
                <div style="font-weight:700; color:var(--muted); font-size:.85rem;">#${i + 1}</div>
                <div style="min-width:0;">
                  <div style="font-weight:700; font-size:.9rem;">${escapeHtml(b.name)}</div>
                  <div style="height:6px; background:var(--surface); border-radius:3px; margin-top:.35rem; overflow:hidden;">
                    <div style="height:100%; width:${pct}%; background: linear-gradient(90deg,#5a67f2,#00c8e8);"></div>
                  </div>
                  <div style="font-size:.7rem; color:var(--muted); margin-top:.25rem;">${fmtN(uploads)} product upload${uploads === 1 ? '' : 's'}</div>
                </div>
                <div style="font-weight:800; font-size:.95rem; white-space:nowrap;">${fmtN(used)} <span style="font-size:.7rem; color:var(--muted); font-weight:500;">try-ons</span></div>
              </div>`;
          }).join('')}
        </div>`}
    </div>
  `;
}

function kpi(label, value, sub) {
  return `
    <div style="background:#fff; border:1px solid var(--border); border-radius: var(--r-md); padding: 1rem 1.1rem; position:relative; overflow:hidden;">
      <div style="position:absolute; top:0; left:0; right:0; height:3px; background: linear-gradient(90deg,#5a67f2,#00c8e8);"></div>
      <div style="font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:.4rem;">${label}</div>
      <div style="font-size:1.75rem; font-weight:900; line-height:1; color:var(--text);">${value}</div>
      <div style="font-size:.72rem; color:var(--muted); margin-top:.4rem;">${sub}</div>
    </div>`;
}

async function loadBrands() {
  try {
    const res = await fetchAdmin('/api/admin/brands');
    const data = await res.json();
    allBrands = data.brands || [];
    document.getElementById('cntBrands').textContent = allBrands.length;
    renderBrands();
    renderAnalytics();

    document.getElementById('brandsList').innerHTML = `<div class="empty"><p>Error: ${escapeHtml(err.message)}</p></div>`;
  }
}

function renderBrands() {
  const container = document.getElementById('brandsList');
  if (allBrands.length === 0) {
    container.innerHTML = `<div class="empty"><div class="icon">🏢</div><p>No brands yet.</p></div>`;
    return;
  }
  const q = (document.getElementById('brandSearch')?.value || '').trim().toLowerCase();
  const list = q
    ? allBrands.filter(b =>
        (b.name || '').toLowerCase().includes(q) ||
        (b.email || '').toLowerCase().includes(q) ||
        (b.id || '').toLowerCase().includes(q)
      )

    container.innerHTML = `<div class="empty"><div class="icon">🔎</div><p>No brands match "${escapeHtml(q)}".</p></div>`;

  }
  container.innerHTML = `
    <table class="data-table">
      <thead><tr><th>Brand</th><th>Status</th><th>Credits</th><th>Used</th><th>Rate</th><th>Actions</th></tr></thead>
      <tbody>
        ${list.map(b => {
          const remaining = (b.tryon_credits || 0) - (b.tryon_credits_used || 0);
          const usagePct = b.tryon_credits > 0 ? (b.tryon_credits_used / b.tryon_credits) * 100 : 0;
          let creditClass = 'ok';
          if (b.unlimited) creditClass = 'unlimited';
          else if (remaining === 0) creditClass = 'low';
          else if (usagePct >= 80) creditClass = 'warn';
          const nameAttr = JSON.stringify(b.name).replace(/"/g, '&quot;');
          return `
            <tr>
              <td data-label="Brand">
                <strong>${escapeHtml(b.name)}</strong>
                <div style="color:var(--muted); font-size:.78rem;">${escapeHtml(b.email)}</div>
                <div style="font-size:.7rem; color:var(--muted); font-family: monospace; margin-top:.15rem;">${b.id}</div>
              </td>
              <td data-label="Status"><span class="status-pill pill-${b.status === 'trial' ? 'pending' : b.status}">${b.status === 'trial' ? 'pending' : b.status}</span></td>
              <td data-label="Credits">
                <div class="credits-cell">
                  ${b.unlimited

                    : `<div class="credits-num ${creditClass}">${remaining} left</div>
                       <div style="font-size:.72rem; color:var(--muted);">of ${b.tryon_credits}</div>`}
                </div>
              </td>
              <td data-label="Used">
                <div style="display:flex; flex-direction:column; gap:.15rem;">
                  <div><span style="font-weight:800; color:#5a67f2;">${b.tryon_count || 0}</span> <span style="font-size:.72rem; color:var(--muted);">try-ons</span></div>
                  <div><span style="font-weight:800; color:#ec4899;">${b.process_count || 0}</span> <span style="font-size:.72rem; color:var(--muted);">uploads</span></div>

              <td data-label="Rate">$${Number(b.price_per_tryon_usd).toFixed(3)}</td>
              <td data-label="Actions">

                  <a class="btn btn-secondary" href="/dashboard?id=${b.id}" target="_blank">Dashboard ↗</a>
                  <button class="btn btn-secondary" style="color:#991b1b; border-color:#fca5a5;" onclick="deleteBrand('${b.id}', ${nameAttr})">Delete</button>
                </div>
              </td>
            </tr>`;
        }).join('')}

    </table>`;

async function deleteBrand(brandId, brandName) {
  const confirmation = prompt(
    `Delete "${brandName}" PERMANENTLY?\n\nThis removes the brand and ALL their try-ons, products, QR codes, passcodes, and top-up records. Cannot be undone.\n\nType the brand name to confirm:`
  );
  if (confirmation === null) return;
  if (confirmation.trim() !== brandName) {
    alert('Name did not match. Brand was not deleted.');
    return;
  }
  try {
    const res = await fetchAdmin(`/api/admin/brands/${brandId}`, { method: 'DELETE' });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || 'Failed to delete');
    }
    await refreshAll();
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

let acBrandId = null;
let acBrandPrice = 0.125;

function openAddCredits(brandId, brandName, price) {
  acBrandId = brandId;
  acBrandPrice = price;
  document.getElementById('acTitle').textContent = `Add Credits — ${brandName}`;
  document.getElementById('acSubtitle').textContent = `Rate: $${Number(price).toFixed(3)} per try-on`;
  ['acCredits','acAmount','acRef','acNotes'].forEach(id => document.getElementById(id).value = '');
  updateAcHint();
  document.getElementById('acError').className = 'alert';
  document.getElementById('addCreditsModal').classList.add('open');
}

document.getElementById('acCredits').addEventListener('input', () => updateAcHint());
document.getElementById('acAmount').addEventListener('input', () => {
  const amt = parseFloat(document.getElementById('acAmount').value);
  if (!isNaN(amt) && acBrandPrice > 0) {
    document.getElementById('acCredits').value = Math.floor(amt / acBrandPrice);
  }
  updateAcHint();
});

function updateAcHint() {
  const credits = parseInt(document.getElementById('acCredits').value, 10) || 0;
  const cost = credits * acBrandPrice;
  document.getElementById('acHint').textContent = credits > 0 ? `≈ $${cost.toFixed(2)} at this rate` : '';
}

function closeAddCreditsModal() {
  document.getElementById('addCreditsModal').classList.remove('open');
}

async function submitAddCredits(e) {
  e.preventDefault();
  const errEl = document.getElementById('acError');
  const btn = document.getElementById('acSubmit');
  errEl.className = 'alert';
  btn.disabled = true;
  btn.textContent = 'Adding…';

  const payload = {
    credits_added: parseInt(document.getElementById('acCredits').value, 10),
    amount_usd: parseFloat(document.getElementById('acAmount').value) || undefined,
    payment_ref: document.getElementById('acRef').value.trim() || undefined,
    notes: document.getElementById('acNotes').value.trim() || undefined,
  };

  try {
    const res = await fetchAdmin(`/api/admin/brands/${acBrandId}/credits`, {
      method: 'POST',
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    closeAddCreditsModal();
    await loadBrands();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.className = 'alert error';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Add Credits →';
  }
  return false;
}

let allTopups = [];
let currentTopupFilter = '';

async function loadTopups() {
  try {
    const res = await fetchAdmin('/api/admin/topup-requests');

    allTopups = data.topups || [];
    const pending = allTopups.filter(t => t.status === 'pending').length;

    renderAnalytics();
  } catch (err) {
    document.getElementById('topupsList').innerHTML = `<div class="empty"><p>Error: ${escapeHtml(err.message)}</p></div>`;

}

function filterTopups(status) {

  document.querySelectorAll('#topupFilters .filter-pill').forEach(p => p.classList.toggle('active', p.dataset.filter === status));

}

  }

    <table class="data-table">

      <tbody>

          const status = String(t.status || 'pending').toLowerCase().trim();
          const isFinal = status === 'approved' || status === 'rejected';
          const pillClass = status === 'approved' ? 'pill-converted' : status === 'rejected' ? 'pill-rejected' : 'pill-pending';
          const safeBrandName = String(t.brand?.name || '').replace(/[\\'`]/g, ' ');
          return `
            <tr>
              <td data-label="Brand">
                <strong>${escapeHtml(t.brand?.name || '—')}</strong>
                <div style="color:var(--muted); font-size:.78rem;">${escapeHtml(t.brand?.email || '')}</div>
                <div style="font-size:.7rem; color:var(--muted); font-family: monospace;">${t.brand_id}</div>
              </td>
              <td data-label="Amount"><strong>$${Number(t.amount_usd).toFixed(2)}</strong>${localStr ? `<div style="font-size:.75rem; color:var(--muted);">${escapeHtml(localStr)}</div>` : ''}</td>
              <td data-label="Credits"><strong>${t.credits_requested}</strong></td>
              <td data-label="Method">${escapeHtml(t.payment_method || '—')}${t.payment_ref ? `<div style="font-size:.7rem; color:var(--muted); font-family:monospace;">${escapeHtml(t.payment_ref)}</div>` : ''}</td>
              <td data-label="Screenshot">${t.payment_screenshot_url ? `<a href="${escapeHtml(t.payment_screenshot_url)}" target="_blank"><img src="${escapeHtml(t.payment_screenshot_url)}" style="width:64px; height:64px; object-fit:cover; border-radius: var(--r-sm); cursor:zoom-in;" loading="lazy"></a>` : '—'}</td>
              <td data-label="Status"><span class="status-pill ${pillClass}">${status}</span>${t.rejection_reason ? `<div style="font-size:.72rem; color:#991b1b; margin-top:.25rem;">${escapeHtml(t.rejection_reason)}</div>` : ''}</td>
              <td data-label="Date" style="color:var(--muted); font-size:.78rem;">${fmtDate(t.created_at)}</td>
              <td data-label="Actions">
                ${!isFinal
                  ? `<div class="row-actions">
                      <button class="btn btn-primary" style="background: linear-gradient(135deg, #10b981, #14b8a6); border-color: transparent;" onclick="approveTopup('${t.id}', ${Number(t.amount_usd)}, ${t.credits_requested}, ${JSON.stringify(safeBrandName).replace(/"/g, '&quot;')})">✓ Approve</button>
                      <button class="btn btn-secondary" style="color:#991b1b; border-color:#fca5a5;" onclick="rejectTopup('${t.id}')">Reject</button>
                    </div>`
                  : t.notes ? `<div style="font-size:.78rem; color:var(--muted);">${escapeHtml(t.notes)}</div>` : ''}
                ${t.brand?.name ? `<a class="btn btn-secondary" style="margin-top:.35rem; font-size:.7rem;" href="https://wa.me/?text=${encodeURIComponent(`Hi, your Try Instant Fit top-up of $${Number(t.amount_usd).toFixed(2)} (${t.credits_requested} credits) has been ${isFinal ? status : 'received and is being reviewed'}.`)}" target="_blank">WhatsApp</a>` : ''}
              </td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

async function approveTopup(id, amount, credits, brandName) {
  if (!confirm(`Approve $${amount.toFixed(2)} top-up for ${brandName} → adds ${credits} credits?`)) return;
  try {
    const res = await fetchAdmin(`/api/admin/topup-requests/${id}`, {
      method: 'POST',
      body: JSON.stringify({ action: 'approve' }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    await loadTopups();
    await loadBrands();
    if (confirm(`✓ Approved! ${credits} credits added.\n\nClick OK to send a WhatsApp confirmation to ${brandName}.`)) {
      const wa = `https://wa.me/?text=${encodeURIComponent(`✓ Your Try Instant Fit top-up of $${amount.toFixed(2)} has been approved. ${credits} credits added to your account. Open your dashboard to start using try-on.`)}`;
      window.open(wa, '_blank');
    }
  } catch (err) { alert('Error: ' + err.message); }
}

// ── Reject Top-Up modal ──────────────────────────────────────────────
let rejectingTopupId = null;
function rejectTopup(id) {
  rejectingTopupId = id;
  document.getElementById('rjReason').value = '';
  document.getElementById('rjError').className = 'alert';
  document.getElementById('rejectTopupModal').classList.add('open');
  setTimeout(() => document.getElementById('rjReason').focus(), 50);
}
function closeRejectTopupModal() {
  document.getElementById('rejectTopupModal').classList.remove('open');
  rejectingTopupId = null;
}
async function submitRejectTopup(e) {
  e.preventDefault();
  if (!rejectingTopupId) return false;
  const errEl = document.getElementById('rjError');
  const btn = document.getElementById('rjSubmit');
  const reason = document.getElementById('rjReason').value.trim();
  errEl.className = 'alert';
  btn.disabled = true;
  btn.textContent = 'Rejecting…';
  try {
    const res = await fetchAdmin(`/api/admin/topup-requests/${rejectingTopupId}`, {
      method: 'POST',
      body: JSON.stringify({ action: 'reject', rejection_reason: reason || null }),
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || 'Failed to reject');
    }
    closeRejectTopupModal();
    await loadTopups();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.className = 'alert error';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Reject Request';
  }
  return false;
}

// ── Helpers ──
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-PK', { day: '2-digit', month: 'short' }) + ' · ' + d.toLocaleTimeString('en-PK', { hour: '2-digit', minute: '2-digit' });
}
