<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogue — Try Instant Fit</title>
  <meta name="description" content="Browse the collection and try any item on with your photo.">
  <!-- Absolute asset paths — this page is served at a multi-segment clean URL
       (/shop/:brandId), so relative paths would 404. -->
  <link rel="icon" type="image/jpeg" href="/assets/website-icon.png">
  <link rel="apple-touch-icon" href="/assets/website-icon.png">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    /* Brand theme variables — overridden at runtime from the brand's
       primary_color. Defaults keep the standard Try Instant Fit look. */
    :root {
      --brand: #5a67f2;                 /* brand accent (buttons, price, active chips) */
      --brand-dark: #4a56d0;            /* darker shade for hovers */
      --brand-contrast: #ffffff;        /* text on top of the brand colour */
      --page-bg-a: #0f1e3d;
      --page-bg-b: #1a2f5a;
    }
    * { -webkit-tap-highlight-color: transparent; }
    body { background: var(--page-bg-a); min-height: 100vh; }
    .shop-wrap { max-width: 720px; margin: 0 auto; padding: 0 .6rem 3rem; }

    /* App-style slim top bar — sticky, compact. Brand logo + name in a row. */
    .shop-appbar {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; gap: .6rem;
      padding: .6rem .3rem; margin-bottom: .5rem;
      background: color-mix(in srgb, var(--page-bg-a) 88%, transparent);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .shop-back {
      flex: 0 0 auto; display: inline-flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,.1); color: #fff; border: none;
      font-size: 1.1rem; cursor: pointer; text-decoration: none; transition: background .15s;
    }
    .shop-back:hover { background: rgba(255,255,255,.2); }
    .shop-brand-logo { height: 30px; width: 30px; object-fit: contain; border-radius: 8px; background: #fff; flex: 0 0 auto; display: none; }
    .shop-brand { color: #fff; font-size: 1.05rem; font-weight: 800; margin: 0; line-height: 1.1; letter-spacing: -.01em; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .shop-visit {
      flex: 0 0 auto; padding: .38rem .7rem; border-radius: var(--r-full);
      font-size: .72rem; font-weight: 700; text-decoration: none;
      background: color-mix(in srgb, var(--brand) 26%, transparent);
      color: #fff; border: 1px solid color-mix(in srgb, var(--brand) 45%, transparent);
    }
    .shop-sub { display: none; }  /* app bar stays compact — no subtitle line */

    /* Controls — flat app-style, not a floating card. */
    .shop-controls { padding: .2rem .3rem .6rem; margin-bottom: .6rem; }
    .shop-search {
      width: 100%; box-sizing: border-box; padding: .7rem .9rem;
      border: none; border-radius: 12px; font-size: .95rem; font-family: inherit; outline: none;
      margin-bottom: .6rem; background: rgba(255,255,255,.94);
    }
    .shop-search:focus { box-shadow: 0 0 0 2px var(--brand); }

    .filter-row { margin-bottom: .45rem; }
    .filter-label { display: none; }  /* chips are self-explanatory; save vertical space */
    .chip-row { display: flex; gap: .4rem; overflow-x: auto; padding-bottom: .15rem; scrollbar-width: none; }
    .chip-row::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto; padding: .38rem .8rem; border: 1px solid rgba(255,255,255,.18);
      border-radius: var(--r-full); background: rgba(255,255,255,.08); font-size: .78rem; font-weight: 600;
      color: rgba(255,255,255,.85); cursor: pointer; white-space: nowrap; font-family: inherit; transition: all .15s;
    }
    .chip:hover { border-color: rgba(255,255,255,.4); }
    .chip.active { background: var(--brand); border-color: var(--brand); color: var(--brand-contrast); }

    .shop-toolbar { display: flex; justify-content: space-between; align-items: center; gap: .6rem; margin-top: .4rem; }
    .shop-count { font-size: .78rem; color: rgba(255,255,255,.55); }
    .shop-sort { padding: .4rem .6rem; border: 1px solid rgba(255,255,255,.18); border-radius: 9px; font-size: .78rem; font-family: inherit; background: rgba(255,255,255,.08); color: #fff; }
    .shop-sort option { color: #111; }

    /* Grid — 2 up on phones (tight, app-like), scaling up on wider screens. */
    .shop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .55rem; align-items: start; }
    @media (min-width: 560px) { .shop-grid { grid-template-columns: repeat(3, 1fr); gap: .7rem; } }
    @media (min-width: 820px) { .shop-grid { grid-template-columns: repeat(4, 1fr); } }

    .card {
      background: #fff; border-radius: 12px; overflow: hidden;
      display: flex; flex-direction: column; box-shadow: 0 3px 12px rgba(0,0,0,.28);
      transition: transform .12s;
    }
    .card:active { transform: scale(.98); }

    .card-media { display: block; background: #f0f1f4; }
    .card-img, .card-img-ph { width: 100%; aspect-ratio: 3/4; display: block; }
    .card-img { object-fit: cover; }
    .card-img-ph { background: linear-gradient(135deg,#5a67f2,#00c8e8); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }

    .card-body { padding: .5rem .55rem .55rem; display: flex; flex-direction: column; }
    .card-cat { font-size: .6rem; color: var(--muted); margin: 0 0 .1rem; text-transform: uppercase; letter-spacing: .03em; }
    .card-name {
      font-size: .78rem; font-weight: 600; color: var(--text); line-height: 1.3; margin: 0 0 .15rem;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-price { font-size: .82rem; font-weight: 800; color: var(--brand); margin: 0 0 .5rem; }
    .card-price.empty { display: none; }   /* no filler row when there's no price */
    /* No margin-top:auto — cards size to content (see .shop-grid align-items:start),
       so short cards don't stretch tall with wasted white space. */
    .card-actions { display: flex; flex-direction: column; gap: .35rem; }
    .card-btn {
      width: 100%; box-sizing: border-box; padding: .5rem .3rem; border-radius: 8px;
      font-size: .78rem; font-weight: 700; cursor: pointer; font-family: inherit;
      text-decoration: none; display: flex; align-items: center; justify-content: center; gap: .25rem;
      border: none; transition: all .15s; white-space: nowrap;
    }
    .card-btn.try { background: var(--brand); color: var(--brand-contrast); }
    .card-btn.try:active { background: var(--brand-dark); }
    .card-btn.buy { background: #fff; color: #15803d; border: 1.5px solid #16a34a; padding: .45rem .3rem; }
    .card-btn.buy:hover { background: #f0fdf4; }

    /* States */
    .shop-state { text-align: center; color: #fff; padding: 3rem 1rem; }
    .shop-state .spinner { width: 44px; height: 44px; border: 4px solid rgba(255,255,255,.15); border-top-color: #00c8e8; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .shop-empty { text-align: center; color: rgba(255,255,255,.7); padding: 2.5rem 1rem; font-size: .95rem; }

    .shop-footer { text-align: center; color: rgba(255,255,255,.45); font-size: .75rem; padding: 2rem 1rem 0; }
    .shop-footer a { color: rgba(255,255,255,.7); }
    img { max-width: 100%; }
  </style>
</head>
<body>

<div class="shop-wrap">

  <!-- Subtle platform strip — the brand leads, TIF stays in the background. -->
  <!-- App-style top bar: back · brand logo + name · visit store. Sticky. -->
  <div class="shop-appbar">
    <a id="backLink" class="shop-back" href="#" aria-label="Back" style="display:none;">←</a>
    <img id="brandLogo" class="shop-brand-logo" src="" alt="">
    <h1 id="brandName" class="shop-brand">Catalogue</h1>
    <a id="visitLink" class="shop-visit" href="#" target="_blank" rel="noopener" style="display:none;">Visit store</a>
  </div>

  <!-- Loading -->
  <div id="loadingView" class="shop-state">
    <div class="spinner"></div>
    <p>Loading the catalogue…</p>
  </div>

  <!-- Error -->
  <div id="errorView" class="shop-state" style="display:none;">
    <div style="font-size:3rem; margin-bottom:.5rem;">🛍️</div>
    <h2 id="errorTitle" style="margin:0 0 .5rem;">Catalogue unavailable</h2>
    <p id="errorMsg" style="color:rgba(255,255,255,.65);">This brand hasn't enabled catalogue browsing yet.</p>
  </div>

  <!-- Main -->
  <div id="mainView" style="display:none;">
    <div class="shop-controls">
      <input type="search" id="searchInput" class="shop-search" placeholder="🔎  Search by name…" autocomplete="off">
      <div class="filter-row" id="audienceRow" style="display:none;">
        <p class="filter-label">For</p>
        <div class="chip-row" id="audienceChips"></div>
      </div>
      <div class="filter-row" id="categoryRow" style="display:none;">
        <p class="filter-label">Category</p>
        <div class="chip-row" id="categoryChips"></div>
      </div>
      <div class="shop-toolbar">
        <span class="shop-count" id="resultCount"></span>
        <select id="sortSelect" class="shop-sort">
          <option value="newest">Newest</option>
          <option value="price_asc">Price: Low to High</option>
          <option value="price_desc">Price: High to Low</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
    </div>

    <div id="grid" class="shop-grid"></div>
    <div id="emptyView" class="shop-empty" style="display:none;">No items match your search or filters.</div>
  </div>

  <div class="shop-footer">
    Powered by <a href="https://tryinstantfit.com" target="_blank">Try Instant Fit</a>
  </div>

</div>

<script>
  // Same-origin API via Vercel rewrite (see vercel.json).
  const API = '';

  let allItems = [];
  let brand = null;
  const state = { search: '', audience: 'all', category: 'all', sort: 'newest' };

  const GROUP_ORDER = ['Eastern', 'Western', 'Formal & Festive'];
  const AUD_ORDER = ['Women', 'Men', 'Kids', 'Unisex'];

  function $(id) { return document.getElementById(id); }
  function show(id) { $(id).style.display = 'block'; }
  function hide(id) { $(id).style.display = 'none'; }
  function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escAttr(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // Read brandId from /shop/:brandId (clean URL) or ?brand= fallback.
  function getBrandId() {
    const m = window.location.pathname.match(/\/shop\/([^/?#]+)/);
    if (m) return decodeURIComponent(m[1]);
    return new URLSearchParams(window.location.search).get('brand') || '';
  }

  (async function init() {
    const brandId = getBrandId();
    if (!brandId) return showError('No brand', 'This catalogue link is missing its brand.');

    // Show a Back link when we came from a product page (so browsing feels
    // connected). history.length > 1 means there's somewhere to go back to.
    if (document.referrer || window.history.length > 1) {
      const back = $('backLink');
      back.style.display = 'inline-flex';
      back.addEventListener('click', (e) => { e.preventDefault(); history.back(); });
    }

    try {
      const res = await fetch(`${API}/api/brands/${brandId}/catalog?limit=120`);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) return showError('Catalogue unavailable', "We couldn't load this catalogue.");
      if (data.catalog_enabled === false) return showError('Catalogue is off', 'This brand has turned off catalogue browsing.');
      allItems = Array.isArray(data.products) ? data.products : [];
      brand = data.brand || null;

      renderBrandHeader();
      if (!allItems.length) {
        hide('loadingView');
        showError('Nothing here yet', 'This brand has no items in their catalogue right now.');
        return;
      }
      buildFilters();
      wireControls();
      hide('loadingView');
      show('mainView');
      render();
    } catch (_) {
      showError('Connection error', 'Please check your internet and try again.');
    }
  })();

  // ── Brand theming ──────────────────────────────────────────────────────
  // Parse "#rrggbb" / "#rgb" → {r,g,b}, or null if unusable.
  function parseHex(hex) {
    if (typeof hex !== 'string') return null;
    let h = hex.trim().replace(/^#/, '');
    if (h.length === 3) h = h.split('').map(c => c + c).join('');
    if (!/^[0-9a-fA-F]{6}$/.test(h)) return null;
    return { r: parseInt(h.slice(0,2),16), g: parseInt(h.slice(2,4),16), b: parseInt(h.slice(4,6),16) };
  }
  // Readable text colour (black/white) for a given background.
  function contrastOn({r,g,b}) {
    // Perceived luminance (sRGB) — light bg → dark text, dark bg → white text.
    const L = (0.299*r + 0.587*g + 0.114*b) / 255;
    return L > 0.62 ? '#111111' : '#ffffff';
  }
  // Darken a colour by `amt` (0–1) for hover states.
  function darken({r,g,b}, amt) {
    const f = v => Math.max(0, Math.round(v * (1 - amt)));
    return `rgb(${f(r)}, ${f(g)}, ${f(b)})`;
  }

  function applyBrandTheme() {
    const rgb = parseHex(brand?.primary_color);
    if (!rgb) return; // no/invalid colour → keep default TIF theme
    const root = document.documentElement.style;
    const hex = brand.primary_color.trim();
    root.setProperty('--brand', hex);
    root.setProperty('--brand-dark', darken(rgb, 0.18));
    root.setProperty('--brand-contrast', contrastOn(rgb));
  }

  function renderBrandHeader() {
    applyBrandTheme();
    const name = brand?.name || 'Catalogue';
    document.title = `${name} — Try Instant Fit`;
    $('brandName').textContent = name;
    if (brand?.logo_url) {
      const l = $('brandLogo');
      l.src = brand.logo_url;
      l.style.display = 'block';
      l.onerror = () => { l.style.display = 'none'; };
    }
    // "Visit store" link to the brand's own website, if they set one.
    if (brand?.website_url) {
      const v = $('visitLink');
      let url = brand.website_url.trim();
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      v.href = url;
      v.style.display = 'inline-block';
    }
  }

  function buildFilters() {
    // Audience chips
    const auds = Array.from(new Set(allItems.map(p => (p.audience||'').trim()).filter(Boolean)))
      .sort((a,b) => AUD_ORDER.indexOf(a) - AUD_ORDER.indexOf(b));
    if (auds.length > 1) {
      $('audienceChips').innerHTML = [{k:'all',l:'Everyone'}].concat(auds.map(a=>({k:a,l:a})))
        .map(c => `<button type="button" class="chip${state.audience===c.k?' active':''}" data-aud="${escAttr(c.k)}">${esc(c.l)}</button>`).join('');
      show('audienceRow');
      $('audienceChips').querySelectorAll('.chip').forEach(b =>
        b.addEventListener('click', () => { state.audience = b.dataset.aud; state.category = 'all'; rebuildCategoryChips(); render(); syncChips(); }));
    }
    rebuildCategoryChips();
  }

  // Category chips depend on the active audience (so the two narrow together),
  // ordered by style group.
  function rebuildCategoryChips() {
    const pool = state.audience === 'all' ? allItems : allItems.filter(p => (p.audience||'').trim() === state.audience);
    const groupOf = {};
    pool.forEach(p => { const c = (p.category||'').trim(); if (c && !(c in groupOf)) groupOf[c] = (p.category_group||'').trim(); });
    const cats = Object.keys(groupOf).sort((a,b) => {
      const ra = GROUP_ORDER.indexOf(groupOf[a]); const rb = GROUP_ORDER.indexOf(groupOf[b]);
      return (ra===-1?9:ra) - (rb===-1?9:rb) || a.localeCompare(b);
    });
    if (cats.length > 1) {
      $('categoryChips').innerHTML = [{k:'all',l:'All'}].concat(cats.map(c=>({k:c,l:c})))
        .map(c => `<button type="button" class="chip${state.category===c.k?' active':''}" data-cat="${escAttr(c.k)}">${esc(c.l)}</button>`).join('');
      show('categoryRow');
      $('categoryChips').querySelectorAll('.chip').forEach(b =>
        b.addEventListener('click', () => { state.category = b.dataset.cat; render(); syncChips(); }));
    } else {
      hide('categoryRow');
    }
  }

  // Reflect active state on chips without a full rebuild (keeps scroll position).
  function syncChips() {
    document.querySelectorAll('#audienceChips .chip').forEach(b => b.classList.toggle('active', b.dataset.aud === state.audience));
    document.querySelectorAll('#categoryChips .chip').forEach(b => b.classList.toggle('active', b.dataset.cat === state.category));
  }

  function wireControls() {
    $('searchInput').addEventListener('input', (e) => { state.search = e.target.value.trim().toLowerCase(); render(); });
    $('sortSelect').addEventListener('change', (e) => { state.sort = e.target.value; render(); });
  }

  function fmtPrice(price, currency) {
    if (price === null || price === undefined || price === '') return '';
    const n = Number(price); if (!Number.isFinite(n)) return '';
    const c = currency || 'PKR';
    return c === 'PKR' ? 'Rs ' + n.toLocaleString('en-PK')
      : c === 'USD' ? '$' + n.toFixed(2)
      : `${c} ${n.toLocaleString()}`;
  }

  function currentList() {
    let list = allItems.slice();
    if (state.audience !== 'all') list = list.filter(p => (p.audience||'').trim() === state.audience);
    if (state.category !== 'all') list = list.filter(p => (p.category||'').trim() === state.category);
    if (state.search) list = list.filter(p => (p.name||'').toLowerCase().includes(state.search));
    const num = v => (v === null || v === undefined || v === '') ? Infinity : Number(v);
    switch (state.sort) {
      case 'price_asc':  list.sort((a,b) => num(a.price) - num(b.price)); break;
      case 'price_desc': list.sort((a,b) => num(b.price) - num(a.price)); break;
      case 'name':       list.sort((a,b) => (a.name||'').localeCompare(b.name||'')); break;
      // 'newest' — keep endpoint order (already newest-first)
    }
    return list;
  }

  // Try-on link for an item: prefer its own scan token (proven flow); fall
  // back to the product page by uuid if somehow tokenless.
  function tryOnHref(p) {
    if (p.token) return `/scan/${encodeURIComponent(p.token)}`;
    return `/scan?product=${encodeURIComponent(p.product_uuid)}`;
  }

  function render() {
    const list = currentList();
    $('resultCount').textContent = `${list.length} item${list.length === 1 ? '' : 's'}`;
    const grid = $('grid');
    if (!list.length) { grid.innerHTML = ''; show('emptyView'); return; }
    hide('emptyView');
    grid.innerHTML = list.map(p => {
      const href = escAttr(tryOnHref(p));
      const img = p.image_url
        ? `<img class="card-img" src="${escAttr(p.image_url)}" alt="${escAttr(p.name)}" loading="lazy">`
        : `<div class="card-img-ph">👗</div>`;
      const price = fmtPrice(p.price, p.currency);
      const cat = (p.category || '').trim();
      const buy = p.buy_url
        ? `<a class="card-btn buy" href="${escAttr(p.buy_url)}" target="_blank" rel="noopener">🛒 Buy Now</a>`
        : '';
      return `<div class="card">
        <a class="card-media" href="${href}" aria-label="Try on ${escAttr(p.name)}">${img}</a>
        <div class="card-body">
          ${cat ? `<p class="card-cat">${esc(cat)}</p>` : ''}
          <a href="${href}" style="text-decoration:none;"><p class="card-name">${esc(p.name || 'Product')}</p></a>
          ${price ? `<p class="card-price">${price}</p>` : ''}
          <div class="card-actions">
            <a class="card-btn try" href="${href}">✨ Try On</a>
            ${buy}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function showError(title, msg) {
    hide('loadingView'); hide('mainView');
    $('errorTitle').textContent = title;
    $('errorMsg').textContent = msg;
    show('errorView');
  }
</script>

</body>
</html>
